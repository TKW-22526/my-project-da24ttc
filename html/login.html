<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <!-- Link Bootstrap 5 -->
     <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script> 
    <script src = "../js/lib.js"></script>
</head>
<body>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4 border p-4 shadow-sm bg-white">
            <h3 class="text-center">Đăng nhập</h3>
            <div class="mb-3">
                <label>Tên đăng nhập:</label>
                <input type="text" id="username" class="form-control" placeholder="Nhập tên bất kỳ...">
            </div>
            <button onclick="handleLogin()" class="btn btn-success w-100">Vào mua hàng</button>
        </div>
    </div>
</div>

<script>
    function handleLogin() {
        const userValue = document.getElementById('username').value;
        if (userValue.trim() === "") return alert("Vui lòng nhập tên!");

        // Giả lập thông tin người dùng
        const user = {
            id: "user_" + Date.now(), // Tạo ID ngẫu nhiên
            name: userValue
        };

        // Lưu vào localStorage
        localStorage.setItem("currentUser", JSON.stringify(user));
        
        // Chuyển hướng về trang chủ hoặc trang sản phẩm
        alert("Chào mừng " + user.name);
        window.location.href = "page4.html"; 
    }
</script>
</body>
</html>
